<!DOCTYPE html>
<html lang="vi">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PMS eSign — Cổng nộp hồ sơ</title>
  
  <!-- Bootstrap 5.3 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  
  <style>
    :root {
      --brand-color: #0d6efd;
      --brand-bg: #f8f9fa;
    }
    body {
      background-color: #f0f2f5;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    .main-container {
      max-width: 800px;
      margin: 40px auto;
    }
    .card-custom {
      border: none;
      border-radius: 15px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      background: white;
      transition: all 0.3s ease;
    }
    .header-title {
      color: var(--brand-color);
      font-weight: 700;
      text-align: center;
      margin-bottom: 20px;
    }
    .status-badge {
      font-size: 0.9em;
      padding: 5px 10px;
      border-radius: 20px;
    }
    /* Spinner overlay */
    #loadingOverlay {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(255,255,255,0.8);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
  </style>
  <?!= include('js'); ?>
</head>
<body>

  <!-- Loading Overlay -->
  <div id="loadingOverlay">
    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
      <span class="visually-hidden">Loading...</span>
    </div>
    <div class="mt-2 fw-bold text-primary" id="loadingText">Đang xử lý...</div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-header">
        <strong class="me-auto" id="toastTitle">Thông báo</strong>
        <small>vừa xong</small>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
      <div class="toast-body" id="toastMsg"></div>
    </div>
  </div>

  <div class="container main-container">
    <h2 class="header-title"><i class="bi bi-shield-check"></i> PMS eSign System</h2>

    <!-- LOGIN SCREEN -->
    <div id="auth" class="card card-custom p-4">
      <h4 class="mb-3 text-center">Đăng nhập hệ thống</h4>
      <div class="row g-3">
        <div class="col-md-7">
          <label class="form-label fw-bold">Email đăng ký</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" id="email" class="form-control" placeholder="example@domain.com">
          </div>
        </div>
        <div class="col-md-5">
          <label class="form-label fw-bold">Mã PIN</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-key"></i></span>
            <input type="password" id="pin" class="form-control" placeholder="****">
          </div>
        </div>
        <div class="col-12 text-end">
          <button class="btn btn-primary w-100 fw-bold py-2" onclick="ui.login()">
            <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
          </button>
        </div>
        <div class="col-12">
           <div id="authMsg" class="text-danger small text-center"></div>
        </div>
      </div>
    </div>

    <!-- MAIN APP SCREEN -->
    <div id="app" class="card card-custom p-4" style="display:none">
      <!-- Info Bar -->
      <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
        <div>
          <div class="fw-bold"><i class="bi bi-person-circle"></i> <span id="welcomeEmail">...</span></div>
          <div class="small text-muted">Vai trò: <span id="welcomeRole" class="badge bg-info">...</span></div>
        </div>
        <div>
          <button class="btn btn-outline-secondary btn-sm me-1" onclick="ui.openChangePin()">
            <i class="bi bi-gear"></i> Đổi PIN
          </button>
          <button class="btn btn-outline-danger btn-sm" onclick="ui.logout()">
            <i class="bi bi-box-arrow-right"></i> Thoát
          </button>
        </div>
      </div>

      <!-- Selection Form -->
      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label class="form-label fw-bold">Dự án</label>
          <select id="project" class="form-select" onchange="ui.loadPackages()">
            <option value="">-- Chọn dự án --</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold">Gói thầu</label>
          <select id="pkg" class="form-select">
            <option value="">-- Chọn gói thầu --</option>
          </select>
        </div>
      </div>

      <!-- Upload Section -->
      <div class="card bg-light border-0 p-3">
        <label class="form-label fw-bold text-primary mb-2">
          <i class="bi bi-file-earmark-pdf-fill"></i> Chọn file PDF đã ký số (USB Token)
        </label>
        
        <div class="input-group mb-2">
          <input type="file" class="form-control" id="signedFile" accept="application/pdf,.pdf">
          <button class="btn btn-success fw-bold" id="btnSave" onclick="ui.uploadSignedOnly()" disabled>
            <i class="bi bi-cloud-upload"></i> Nộp hồ sơ
          </button>
        </div>

        <!-- Alert areas -->
        <div id="fileValidationAlert" class="alert alert-secondary d-none py-2 small" role="alert"></div>
        <div id="uploadResultAlert" class="alert d-none mt-2" role="alert"></div>
      </div>
    </div>

    <!-- Modal Đổi PIN -->
    <div class="modal fade" id="pinModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Đổi mã PIN</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">PIN hiện tại</label>
              <input type="password" id="pinOld" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">PIN mới (tối thiểu 4 số)</label>
              <input type="password" id="pinNew" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">Nhập lại PIN mới</label>
              <input type="password" id="pinNew2" class="form-control">
            </div>
            <div id="pinMsg" class="text-danger small"></div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
            <button type="button" class="btn btn-primary" onclick="ui.changePin()">Xác nhận đổi</button>
          </div>
        </div>
      </div>
    </div>

    <div class="text-center mt-4 text-muted small">
      &copy; 2026 Nguyễn Ngọc Nguyên
    </div>
  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
